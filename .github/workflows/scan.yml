name: Breakout DCA Screener

on:
  # ตลาด US ปิด → รัน 05:00 BKK (22:00 UTC) จ-ศ
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      limit:
        description: 'จำกัดจำนวนหุ้น/universe (เว้นว่าง=ทั้งหมด) — ใช้ตอนเทส'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scan:
    strategy:
      fail-fast: false          # universe ตัวนึงพัง อีก 2 ตัวยังเดินต่อ
      matrix:
        universe: [nasdaq100, sp500, sp400, sp600]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Scan ${{ matrix.universe }}
        run: |
          ARGS="--universe ${{ matrix.universe }}"
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python run_scan.py $ARGS
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.universe }}
          path: |
            docs/${{ matrix.universe }}.json
            docs/${{ matrix.universe }}-reversals.json
            docs/${{ matrix.universe }}-levels.json
          retention-days: 2

  # ── ทั้งตลาด US ~6-7k → shard 8 job แยก runner (แยก IP · ~850 ตัว/IP เท่าระดับ sp600) ──
  # รันพร้อม scan (คืนละครั้งหลังตลาดปิด) · แต่ละ shard เขียน bundle → merge ตอน publish
  scan_all:
    strategy:
      fail-fast: false          # shard พังตัวเดียว ตัวอื่นเดินต่อ (merge จะ skip ถ้าขาด)
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]   # 8 shard — escalate = เพิ่มที่นี่ + merge --shards
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Scan us-all shard ${{ matrix.shard }}/8
        run: |
          ARGS="--universe us-all --shard ${{ matrix.shard }}/8 --throttle 0.35"
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          python run_scan.py $ARGS
      - name: Upload shard result
        uses: actions/upload-artifact@v4
        with:
          name: result-us-all-${{ matrix.shard }}
          path: docs/us-all-shard${{ matrix.shard }}.json
          retention-days: 2

  publish:
    needs: [scan, scan_all]
    if: always()               # เผยแพร่แม้บาง universe/shard fail (ใช้ของเดิมแทน)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
      - name: Assemble docs/ + index.json
        run: |
          mkdir -p docs
          for u in nasdaq100 sp500 sp400 sp600; do
            f="_artifacts/result-$u/$u.json"
            if [ -f "$f" ]; then cp "$f" "docs/$u.json"; fi
            r="_artifacts/result-$u/$u-reversals.json"
            if [ -f "$r" ]; then cp "$r" "docs/$u-reversals.json"; fi
            l="_artifacts/result-$u/$u-levels.json"
            if [ -f "$l" ]; then cp "$l" "docs/$u-levels.json"; fi
          done
          # ทั้งตลาด: รวม 8 shard → us-all.json + -reversals + -levels + -table (skip ถ้า shard ไม่ครบ)
          python scripts/merge_shards.py --universe us-all --shards 8 --artifacts _artifacts
          python scripts/build_index.py
      - name: Commit & push
        run: |
          git config user.name  "daddy-screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh screener $(date -u +%FT%TZ)"
            git push
          fi
